<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aqua · dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .mono { font-family: 'SF Mono', Menlo, Monaco, 'Cascadia Code', Consolas, monospace; }
  .pulse-dot::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    background: currentColor;
    border-radius: 999px;
    margin-right: 6px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  .slide-in {
    animation: slideIn 0.25s ease-out;
  }
  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  .fade-in { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }
</style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
<div class="max-w-7xl mx-auto p-4 md:p-6 space-y-4">

  <!-- header -->
  <header class="flex items-center gap-3 pb-1">
    <div class="text-2xl">🜂</div>
    <h1 class="text-xl font-semibold tracking-tight">aqua <span class="text-slate-500 font-normal">· dashboard</span></h1>
    <span id="status" class="ml-auto text-xs text-slate-500 mono">conectando…</span>
  </header>

  <!-- command input -->
  <div class="flex gap-2">
    <input id="cmd" type="text" placeholder='probá: /reporte tareas de Roy en Done'
           class="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-4 py-3 mono text-sm placeholder-slate-600 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/20" />
    <button id="send" class="bg-amber-500 hover:bg-amber-400 active:bg-amber-600 text-slate-950 font-semibold px-6 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">enviar</button>
  </div>

  <!-- JEFA card -->
  <div id="jefa" class="hidden bg-gradient-to-br from-amber-900/30 via-amber-800/20 to-slate-900 border border-amber-700/40 rounded-xl p-5 shadow-lg shadow-amber-900/10">
    <div class="flex items-center gap-2 mb-3">
      <span class="text-2xl">🎩</span>
      <h2 class="font-semibold text-amber-300 tracking-wide">JEFA</h2>
      <span class="text-xs text-slate-500 mono ml-2">orquestadora</span>
      <span id="jefa-status" class="ml-auto text-xs mono text-amber-400/80"></span>
    </div>
    <div id="jefa-desc" class="text-sm text-slate-300 mb-3"></div>
    <div class="flex items-center gap-4">
      <div class="flex-1 bg-slate-800/60 rounded-full h-3 overflow-hidden border border-slate-700/50">
        <div id="jefa-bar" class="bg-gradient-to-r from-amber-500 to-amber-400 h-full transition-all duration-300" style="width:0%"></div>
      </div>
      <span id="jefa-progress" class="mono text-sm font-semibold w-16 text-right">0/0</span>
      <span id="jefa-time" class="mono text-xs text-slate-400 w-16 text-right">0s</span>
    </div>
    <div id="jefa-delivered" class="mt-3 text-xs text-slate-400 mono leading-relaxed"></div>
  </div>

  <!-- workers grid -->
  <div>
    <div id="workers-label" class="hidden text-xs text-slate-500 uppercase tracking-wider mb-2 mono">workers</div>
    <div id="workers" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3"></div>
  </div>

  <!-- chat history -->
  <div id="chat" class="space-y-2 mt-2"></div>

  <!-- reports list -->
  <details class="bg-slate-900 border border-slate-800 rounded-lg p-3 mt-6" id="reports-details">
    <summary class="cursor-pointer text-sm text-slate-300 select-none">📜 Reportes generados <span id="reports-count" class="text-slate-500 ml-1">(0)</span></summary>
    <div id="reports-list" class="mt-3 space-y-1 text-xs text-slate-400 mono"></div>
  </details>

</div>

<!-- drawer for worker detail -->
<div id="drawer-bg" class="hidden fixed inset-0 bg-black/40 z-40" onclick="closeDrawer()"></div>
<aside id="drawer" class="hidden fixed inset-y-0 right-0 w-full md:w-[28rem] bg-slate-900 border-l border-slate-800 z-50 overflow-y-auto shadow-2xl slide-in">
  <div class="sticky top-0 bg-slate-900 border-b border-slate-800 p-4 flex items-center justify-between">
    <h3 id="drawer-title" class="font-semibold mono"></h3>
    <button onclick="closeDrawer()" class="text-slate-400 hover:text-slate-200 text-xl leading-none">✕</button>
  </div>
  <div id="drawer-content" class="p-4 space-y-4"></div>
</aside>

<script>
const $ = (id) => document.getElementById(id);
const escapeHTML = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtElapsed = (ms) => {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  const r = s % 60;
  return m + 'm' + (r ? r + 's' : '');
};

// state
const workers = new Map(); // jobID -> {status, tools:[], lastTool, startTime, elapsed, output, error, retries}
let jefa = null;
let reports = [];

// SSE
const es = new EventSource('/events');
es.onopen = () => { $('status').textContent = '● en vivo'; $('status').className = 'ml-auto text-xs text-emerald-400 mono'; };
es.onerror = () => { $('status').textContent = '○ desconectado'; $('status').className = 'ml-auto text-xs text-rose-400 mono'; };
es.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch(err) { console.error(err); } };

function handleEvent(evt) {
  switch (evt.type) {
    case 'chat_user':       addChat('user', evt.payload?.text); break;
    case 'chat_assistant':  addChat('assistant', evt.payload?.text, evt.payload?.artifact); break;
    case 'chat_system':     addChat('system', evt.payload?.text); break;
    case 'chat_error':      addChat('error', evt.payload?.error); break;
    case 'orch_start':      startJefa(evt.payload); break;
    case 'orch_done':       finishJefa(evt.payload); break;
    case 'job_start':       startWorker(evt.job_id); break;
    case 'tool_call':       toolCall(evt.job_id, evt.payload?.tool); break;
    case 'job_done':        finishWorker(evt.job_id, evt.payload); break;
  }
}

function startJefa(p) {
  jefa = {
    kind: p?.kind || 'orchestrate',
    desc: p?.descripcion || '',
    total: p?.total || 0,
    poolSize: p?.pool_size || 0,
    done: 0,
    delivered: [],
    startTime: Date.now(),
    artifact: null,
  };
  workers.clear();
  $('workers').innerHTML = '';
  $('jefa').classList.remove('hidden');
  $('workers-label').classList.remove('hidden');
  $('jefa-desc').innerHTML = `<span class="text-amber-200">${escapeHTML(jefa.desc)}</span> <span class="text-slate-500">·</span> <span class="mono text-slate-400">${jefa.total} jobs · pool=${jefa.poolSize}</span>`;
  $('jefa-status').textContent = '● orquestando';
  updateJefa();
}

function finishJefa(p) {
  if (!jefa) return;
  jefa.done = jefa.total;
  jefa.artifact = p?.artifact || null;
  jefa.ok = p?.ok || 0;
  jefa.fail = p?.fail || 0;
  $('jefa-status').textContent = '✓ entregado';
  $('jefa-status').className = 'ml-auto text-xs mono text-emerald-400';
  updateJefa();
  if (jefa.artifact) {
    reports.unshift({path: jefa.artifact, desc: jefa.desc, ok: jefa.ok, fail: jefa.fail, time: new Date()});
    renderReports();
  }
}

function startWorker(jobID) {
  if (!jobID) return;
  const w = { status: 'thinking', tools: [], lastTool: null, startTime: Date.now(), elapsed: 0 };
  workers.set(jobID, w);
  renderWorker(jobID, w);
}

function toolCall(jobID, tool) {
  if (!jobID) return;
  let w = workers.get(jobID);
  if (!w) { startWorker(jobID); w = workers.get(jobID); }
  w.status = 'tool';
  w.lastTool = tool;
  w.tools.push({tool, at: Date.now()});
  renderWorker(jobID, w);
}

function finishWorker(jobID, p) {
  if (!jobID) return;
  let w = workers.get(jobID);
  if (!w) { startWorker(jobID); w = workers.get(jobID); }
  w.status = p?.success ? 'done' : 'fail';
  w.elapsed = p?.elapsed_ms || (Date.now() - w.startTime);
  w.output = p?.output || '';
  w.error = p?.error || '';
  w.retries = p?.retries || 0;
  renderWorker(jobID, w);
  if (jefa) {
    jefa.done++;
    if (p?.success) jefa.delivered.push(jobID);
    updateJefa();
  }
}

function renderWorker(jobID, w) {
  let card = document.getElementById('w-' + jobID);
  const isNew = !card;
  if (isNew) {
    card = document.createElement('div');
    card.id = 'w-' + jobID;
    card.className = 'fade-in bg-slate-900 border border-slate-800 rounded-lg p-3 cursor-pointer hover:border-slate-700 hover:bg-slate-800/50 transition-colors';
    card.onclick = () => openDrawer(jobID);
    $('workers').appendChild(card);
  }
  let statusIcon, statusClass, borderAccent;
  switch (w.status) {
    case 'done':    statusIcon = '✓'; statusClass = 'text-emerald-400'; borderAccent = 'border-l-2 border-l-emerald-500/60'; break;
    case 'fail':    statusIcon = '✗'; statusClass = 'text-rose-400';    borderAccent = 'border-l-2 border-l-rose-500/60'; break;
    case 'tool':    statusIcon = '◉'; statusClass = 'text-amber-400 pulse-dot'; borderAccent = 'border-l-2 border-l-amber-500/60'; break;
    default:        statusIcon = '○'; statusClass = 'text-sky-400 pulse-dot'; borderAccent = 'border-l-2 border-l-sky-500/60';
  }
  card.className = 'fade-in bg-slate-900 border border-slate-800 rounded-lg p-3 cursor-pointer hover:border-slate-700 hover:bg-slate-800/50 transition-colors ' + borderAccent;
  const elapsedStr = (w.status === 'done' || w.status === 'fail')
    ? fmtElapsed(w.elapsed)
    : fmtElapsed(Date.now() - w.startTime);
  card.innerHTML = `
    <div class="flex items-center justify-between mb-1.5">
      <span class="font-semibold text-sm mono">${escapeHTML(jobID)}</span>
      <span class="${statusClass} text-base leading-none">${statusIcon}</span>
    </div>
    <div class="text-[11px] text-slate-400 mono truncate" title="${escapeHTML(w.lastTool || '')}">${escapeHTML(w.lastTool || 'pensando')}</div>
    <div class="text-[11px] text-slate-500 mt-1.5 flex justify-between">
      <span>${w.tools.length} tool${w.tools.length === 1 ? '' : 's'}</span>
      <span class="mono">${elapsedStr}</span>
    </div>
  `;
}

function updateJefa() {
  if (!jefa) return;
  const pct = jefa.total === 0 ? 0 : Math.round(jefa.done * 100 / jefa.total);
  $('jefa-bar').style.width = pct + '%';
  $('jefa-progress').textContent = jefa.done + '/' + jefa.total;
  $('jefa-time').textContent = fmtElapsed(Date.now() - jefa.startTime);
  const delivered = jefa.delivered.length;
  if (delivered > 0) {
    const shown = jefa.delivered.slice(-8);
    const more = delivered - shown.length;
    $('jefa-delivered').innerHTML = '✓ entregados (' + delivered + '): ' + shown.map(escapeHTML).join(', ') + (more > 0 ? ` <span class="text-slate-500">+${more} más</span>` : '');
  }
}

function addChat(role, text, artifact) {
  if (!text) return;
  const wrap = document.createElement('div');
  wrap.className = 'fade-in';
  const palette = {
    user:      { label: 'vos',    accent: 'border-l-sky-500',     bg: 'bg-sky-950/30' },
    assistant: { label: 'aqua',   accent: 'border-l-amber-500',   bg: 'bg-slate-900' },
    system:    { label: 'sistema',accent: 'border-l-slate-500',   bg: 'bg-slate-900/50' },
    error:     { label: 'error',  accent: 'border-l-rose-500',    bg: 'bg-rose-950/30' },
  };
  const p = palette[role] || palette.assistant;
  let artifactHTML = '';
  if (artifact) {
    const name = artifact.split(/[/\\]/).pop();
    artifactHTML = `<div class="mt-2"><a href="/reports/${escapeHTML(name)}" target="_blank" class="inline-flex items-center gap-1 text-xs text-amber-400 hover:text-amber-300 underline">📄 ${escapeHTML(name)}</a></div>`;
  }
  wrap.innerHTML = `
    <div class="border-l-2 ${p.accent} ${p.bg} px-4 py-2 rounded-r-lg">
      <div class="text-[10px] text-slate-500 mono uppercase tracking-wider mb-1">${p.label}</div>
      <div class="text-sm whitespace-pre-wrap leading-relaxed">${escapeHTML(text)}</div>
      ${artifactHTML}
    </div>`;
  $('chat').appendChild(wrap);
  wrap.scrollIntoView({behavior: 'smooth', block: 'end'});
}

function renderReports() {
  $('reports-count').textContent = `(${reports.length})`;
  $('reports-list').innerHTML = reports.map(r => {
    const name = r.path.split(/[/\\]/).pop();
    return `<div><a href="/reports/${escapeHTML(name)}" target="_blank" class="text-amber-400 hover:underline">${escapeHTML(name)}</a> <span class="text-slate-500">·</span> ${escapeHTML(r.desc)} <span class="text-slate-500">·</span> ${r.ok}✓ ${r.fail}✗</div>`;
  }).join('');
  if (reports.length > 0) $('reports-details').setAttribute('open', '');
}

function openDrawer(jobID) {
  const w = workers.get(jobID);
  if (!w) return;
  $('drawer-title').textContent = jobID;
  const statusBadge = {
    done:     '<span class="text-emerald-400">✓ entregado</span>',
    fail:     '<span class="text-rose-400">✗ falló</span>',
    tool:     '<span class="text-amber-400">◉ en tool</span>',
    thinking: '<span class="text-sky-400">○ pensando</span>',
  }[w.status] || '';
  const elapsedStr = (w.status === 'done' || w.status === 'fail')
    ? fmtElapsed(w.elapsed)
    : fmtElapsed(Date.now() - w.startTime);
  const toolsList = w.tools.length === 0
    ? '<div class="text-slate-500 text-xs italic">aún sin tools llamadas</div>'
    : w.tools.map((t, i) => `<div class="flex items-baseline gap-2 py-1 border-b border-slate-800/50 last:border-0"><span class="text-slate-600 text-xs mono w-6 text-right">${i + 1}.</span><span class="text-xs mono text-slate-300 flex-1">${escapeHTML(t.tool)}</span><span class="text-[10px] text-slate-600 mono">${fmtElapsed(t.at - w.startTime)}</span></div>`).join('');
  let outputBlock = '';
  if (w.output) {
    outputBlock = `<div class="text-xs text-slate-500 uppercase tracking-wider mt-4 mb-2 mono">output (markdown crudo)</div><pre class="text-xs bg-slate-950 border border-slate-800 rounded p-3 overflow-x-auto whitespace-pre-wrap text-slate-300 mono max-h-96">${escapeHTML(w.output)}</pre>`;
  } else if (w.error) {
    outputBlock = `<div class="text-xs text-rose-400 uppercase tracking-wider mt-4 mb-2 mono">error</div><pre class="text-xs bg-rose-950/30 border border-rose-900/50 rounded p-3 overflow-x-auto whitespace-pre-wrap text-rose-300 mono">${escapeHTML(w.error)}</pre>`;
  }
  $('drawer-content').innerHTML = `
    <div class="space-y-1">
      <div class="text-sm">${statusBadge}</div>
      <div class="text-xs text-slate-400 mono">${elapsedStr} · ${w.tools.length} tools · ${w.retries || 0} retries</div>
    </div>
    <div>
      <div class="text-xs text-slate-500 uppercase tracking-wider mb-2 mono">tools llamadas</div>
      <div class="bg-slate-950 border border-slate-800 rounded p-2">${toolsList}</div>
    </div>
    ${outputBlock}
  `;
  $('drawer-bg').classList.remove('hidden');
  $('drawer').classList.remove('hidden');
}

function closeDrawer() {
  $('drawer').classList.add('hidden');
  $('drawer-bg').classList.add('hidden');
}

// refresh elapsed times every second for active items
setInterval(() => {
  workers.forEach((w, id) => {
    if (w.status === 'tool' || w.status === 'thinking') renderWorker(id, w);
  });
  if (jefa && !jefa.artifact) updateJefa();
}, 1000);

// command sending
async function sendCommand() {
  const text = $('cmd').value.trim();
  if (!text) return;
  $('cmd').value = '';
  $('send').disabled = true;
  try {
    const res = await fetch('/command', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text}),
    });
    if (!res.ok) {
      const err = await res.text();
      addChat('error', err);
    }
  } catch (e) {
    addChat('error', e.message);
  } finally {
    $('send').disabled = false;
    $('cmd').focus();
  }
}
$('send').onclick = sendCommand;
$('cmd').onkeydown = (e) => { if (e.key === 'Enter') sendCommand(); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });
$('cmd').focus();
</script>
</body>
</html>
